        @keyframes bounceArrowLeft {

        /* ============================================================

<script>
    // ===== LANYARD API (unverändert) =====
    const USER_ID = '156129424238968832';
    const API_URL = `https://api.lanyard.rest/v1/users/${USER_ID}`;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const badgeDot = document.getElementById('badgeDot');
    const badgeText = document.getElementById('badgeText');
    const lastSeen = document.getElementById('lastSeen');

    const LAST_SEEN_KEY = 'discord_last_seen';
    const LAST_STATUS_KEY = 'discord_last_status';

    let savedLastSeen = localStorage.getItem(LAST_SEEN_KEY);
    let savedStatus = localStorage.getItem(LAST_STATUS_KEY);

    function formatTimeAgo(timestamp) {
        const now = Math.floor(Date.now() / 1000);
        const diff = now - timestamp;
        if (diff < 60) return 'Just now';
        if (diff < 3600) {
            const mins = Math.floor(diff / 60);
            return `${mins} minute${mins > 1 ? 's' : ''} ago`;
        }
        if (diff < 86400) {
            const hours = Math.floor(diff / 3600);
            return `${hours} hour${hours > 1 ? 's' : ''} ago`;
        }
        const days = Math.floor(diff / 86400);
        return `${days} day${days > 1 ? 's' : ''} ago`;
    }

    function updateUI(status, lastSeenTimestamp) {
        let color, label;
        switch(status) {
            case 'online':   color = '#3ba55c'; label = 'Online'; break;
            case 'idle':     color = '#faa81a'; label = 'Idle'; break;
            case 'dnd':      color = '#ed4245'; label = 'Do Not Disturb'; break;
            case 'offline':  color = '#747f8d'; label = 'Offline'; break;
            default:         color = '#747f8d'; label = 'Unknown';
        }
        statusDot.style.background = color;
        statusText.textContent = label;
        badgeDot.style.background = color;
        badgeText.textContent = label;

        if (status === 'offline' && lastSeenTimestamp) {
            const timeAgo = formatTimeAgo(lastSeenTimestamp);
            lastSeen.textContent = `Last seen: ${timeAgo}`;
        } else if (status === 'offline' && !lastSeenTimestamp) {
            lastSeen.textContent = 'Last seen: unknown (go online once)';
        } else {
            lastSeen.textContent = '🟢 Active now';
        }
    }

    function fetchStatus() {
        fetch(API_URL)
            .then(response => {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(data => {
                if (data.success && data.data) {
                    const newStatus = data.data.discord_status;
                    const previousStatus = savedStatus;

                    if (newStatus === 'offline' && previousStatus !== 'offline') {
                        const now = Math.floor(Date.now() / 1000);
                        localStorage.setItem(LAST_SEEN_KEY, now);
                        savedLastSeen = now;
                    }

                    localStorage.setItem(LAST_STATUS_KEY, newStatus);
                    savedStatus = newStatus;

                    let lastSeenTimestamp = localStorage.getItem(LAST_SEEN_KEY);
                    if (lastSeenTimestamp) {
                        lastSeenTimestamp = parseInt(lastSeenTimestamp, 10);
                    } else {
                        lastSeenTimestamp = null;
                    }

                    updateUI(newStatus, lastSeenTimestamp);
                } else {
                    throw new Error('Invalid API response');
                }
            })
            .catch(err => {
                console.error('Lanyard error:', err);
                statusDot.style.background = '#747f8d';
                statusText.textContent = 'Error';
                badgeDot.style.background = '#747f8d';
                badgeText.textContent = 'Error';
                const last = localStorage.getItem(LAST_SEEN_KEY);
                if (last) {
                    const ts = parseInt(last, 10);
                    lastSeen.textContent = `Last seen: ${formatTimeAgo(ts)} (cached)`;
                } else {
                    lastSeen.textContent = '⚠️ Error loading status';
                }
            });
    }

    if (savedStatus) {
        const lastSeenTimestamp = localStorage.getItem(LAST_SEEN_KEY) ? parseInt(localStorage.getItem(LAST_SEEN_KEY), 10) : null;
        updateUI(savedStatus, lastSeenTimestamp);
    }

    fetchStatus();
    setInterval(fetchStatus, 5000);
</script>
